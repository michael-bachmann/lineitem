<!-- Canonical brand mark: rounded-square badge with three "line item" bars.
     Single source of truth — rendered as a React component by Mark.tsx (via
     vite-plugin-svgr `?react`) and rasterized into the extension's manifest
     icons by @wxt-dev/auto-icons. Uses the literal brand color (the value of
     the brand token in styles/theme.css) rather than a CSS var, since the icon
     build rasterizes this file outside the DOM where vars don't resolve. -->
<svg width="128" height="128" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="28" height="28" rx="8.5" fill="#b5838d" />
  <rect x="7" y="8.2" width="11" height="2.7" rx="1.35" fill="#fff" />
  <rect x="7" y="12.65" width="14" height="2.7" rx="1.35" fill="#fff" opacity="0.92" />
  <rect x="7" y="17.1" width="8" height="2.7" rx="1.35" fill="#fff" opacity="0.66" />
</svg>
