name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads changed files via the PR API

# Cancel superseded runs on the same ref (PR or branch) when new commits land.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the monorepo changed so the heavy jobs only run when
  # relevant. The extension depends on @lineitem/ui, so it watches packages/ui.
  changes:
    runs-on: ubuntu-latest
    outputs:
      extension: ${{ steps.filter.outputs.extension }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            extension:
              - 'apps/extension/**'
              - 'packages/ui/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            worker:
              - 'apps/worker/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  extension:
    needs: changes
    if: ${{ needs.changes.outputs.extension == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter extension compile
      - name: Unit tests
        run: pnpm --filter extension test:run
      - name: Build + package zip
        run: pnpm --filter extension zip
      - uses: actions/upload-artifact@v7
        with:
          name: extension-zip
          path: apps/extension/.output/*.zip
          retention-days: 7

  worker:
    needs: changes
    if: ${{ needs.changes.outputs.worker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter worker compile
      - name: Unit tests
        run: pnpm --filter worker test
      - name: Validate wrangler config + bundle
        run: pnpm --filter worker exec wrangler deploy --dry-run --outdir dist
